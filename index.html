<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光復客運模擬器 - 招人公告</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
            border-top: 8px solid #0056b3; /* 客運風格藍色 */
        }
        h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .job-list {
            text-align: left;
            background: #f9f9f9;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .job-item {
            margin: 10px 0;
            display: flex;
            align-items: center;
        }
        .job-item::before {
            content: "🚌";
            margin-right: 10px;
        }
        .btn {
            display: inline-block;
            background-color: #5865F2; /* Discord 招牌色 */
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #4752c4;
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>光復客運模擬器</h1>
    <p class="subtitle">—— 誠招新成員加入 ——</p>
    
    <div class="job-list">
        <div class="job-item">專業駕駛員（準點、穩重）</div>
        <div class="job-item">調度人員（排班、行政管理）</div>
        <div class="job-item">熱血玩家（共同交流、開發）</div>
    </div>

    <p>準備好開啟你的客運生涯了嗎？</p>
    
    <a href="https://discord.gg/RV2rjpB6p" class="btn" target="_blank">點此加入 Discord 伺服器</a>

    <div class="footer">
        © 2026 光復客運模擬器 運營團隊
    </div>
</div>

</body>
</html>
